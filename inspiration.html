<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seek Inspiration | Ramayan</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Rozha+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="inspiration.css">
    
    <!-- Preload background image -->
    <link rel="preload" href="assets/inspiration_bg.png" as="image">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="back-btn-container fade-in">
        <a href="index.html#main-app" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Arenas</a>
    </div>

    <div class="page-container fade-in">
        <header class="page-header">
            <h2>Guidance for Life</h2>
            <p>Share your crossroad. Find your path illuminated.</p>
        </header>

        <main class="content-container">
            <section id="inspiration" class="app-section">
                <div class="inspiration-input-area">
                    <textarea id="problem-input" class="glass-input" placeholder="Speak thy heart... E.g., 'I am facing a dilemma', 'I feel lost'" rows="5"></textarea>
                    <button id="seek-guidance-btn" class="primary-btn glow-btn"><i class="fa-solid fa-om"></i> Seek Wisdom</button>
                </div>

                <div id="loading-spinner" class="hidden loading-container">
                    <div class="ancient-spinner"></div>
                    <p>Consulting the ancient texts...</p>
                </div>

                <div id="inspiration-results-container" class="results-container hidden">
                    <!-- Dynamic results will be injected here by script.js -->
                </div>

                <div id="no-result" class="hidden error-msg glass-panel slide-up">
                    <i class="fa-solid fa-peace mb-icon"></i>
                    <p>The texts suggest looking within. Try expressing your thoughts differently.</p>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
