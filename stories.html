<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epic Stories | Ramayan</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Rozha+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="stories.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="back-btn-container fade-in">
        <a href="index.html#main-app" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Shrine</a>
    </div>

    <div class="page-container fade-in">
        <header class="page-header">
            <h2>Epic Narratives</h2>
            <p>Select a Kaanda or instance to witness the divine play.</p>
        </header>

        <main class="content-container">
            <section id="stories" class="app-section">
                <!-- Selection Grid -->
                <div id="story-cards-container" class="story-cards-grid">
                    <!-- Cards populated by JS -->
                </div>
                <!-- Story Display Area -->
                <div id="story-display" class="story-display glass-panel hidden slide-up">
                    <button id="back-to-stories-btn" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Stories</button>
                    <div class="story-header-flex">
                        <h4 id="display-title"></h4>
                        <span id="display-kanda" class="badge"></span>
                    </div>
                    <div class="story-content-wrapper">
                         <img id="display-image" src="" alt="Story visual">
                         <div class="story-text-container">
                             <p id="display-text"></p>
                         </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
